name: Notify Discord

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, closed ]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Decide message
        id: msg
        run: |
          REPO="${{ github.repository }}"
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "push" ]; then
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            AUTHOR="${{ github.actor }}"
            BRANCH="${{ github.ref_name }}"
            URL="${{ github.event.head_commit.url }}"
            {
              echo "CONTENT<<EOF"
              printf '📦 **%s**\n✅ **Push to `%s`** by **%s**\n%s\n%s\n' "$REPO" "$BRANCH" "$AUTHOR" "$COMMIT_MSG" "$URL"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT" = "pull_request" ] && [ "${{ github.event.action }}" = "opened" ]; then
            TITLE="${{ github.event.pull_request.title }}"
            AUTHOR="${{ github.actor }}"
            URL="${{ github.event.pull_request.html_url }}"
            BASE="${{ github.event.pull_request.base.ref }}"
            HEAD="${{ github.event.pull_request.head.ref }}"
            {
              echo "CONTENT<<EOF"
              printf '📦 **%s**\n🆕 **PR Opened** by **%s**\n**%s**\n`%s` → `%s`\n%s\n' "$REPO" "$AUTHOR" "$TITLE" "$HEAD" "$BASE" "$URL"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT" = "pull_request" ] && [ "${{ github.event.action }}" = "closed" ] && [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            TITLE="${{ github.event.pull_request.title }}"
            AUTHOR="${{ github.actor }}"
            URL="${{ github.event.pull_request.html_url }}"
            BASE="${{ github.event.pull_request.base.ref }}"
            HEAD="${{ github.event.pull_request.head.ref }}"
            {
              echo "CONTENT<<EOF"
              printf '📦 **%s**\n🎉 **PR Merged** by **%s**\n**%s**\n`%s` → `%s`\n%s\n' "$REPO" "$AUTHOR" "$TITLE" "$HEAD" "$BASE" "$URL"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "CONTENT<<EOF"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send to Discord
        if: steps.msg.outputs.CONTENT != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CONTENT: ${{ steps.msg.outputs.CONTENT }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skip notification."
            exit 0
          fi

          payload=$(jq -Rn --arg content "$CONTENT" '{content: $content}')
          curl -fsS -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL"