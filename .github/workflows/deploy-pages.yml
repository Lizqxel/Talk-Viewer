name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set Base Path
        shell: bash
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_BASE_PATH=/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi

      - name: Set Public API URL
        env:
          NEXT_PUBLIC_TALK_API_URL: ${{ vars.NEXT_PUBLIC_TALK_API_URL }}
        shell: bash
        run: |
          if [ -z "$NEXT_PUBLIC_TALK_API_URL" ]; then
            echo "Repository variable NEXT_PUBLIC_TALK_API_URL is not set."
            exit 1
          fi

          {
            echo "NEXT_PUBLIC_TALK_API_URL<<EOF"
            echo "$NEXT_PUBLIC_TALK_API_URL"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Site
        run: npm run build:web

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
